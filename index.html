<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S &amp; E</title>
<style>
  :root{
    --pink:#FF6FA5;
    --coral:#FF9A7B;
    --lavender:#B892FF;
    --cream:#FFF6F0;
    --deep:#3D1F3D;
    --gold:#FFD166;
    --mint:#7BE0C9;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:linear-gradient(135deg,#FF6FA5 0%,#B892FF 50%,#7BE0C9 100%);
    background-size:200% 200%;
    animation:gradientShift 15s ease infinite;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    color:var(--deep);
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }
  .app{
    width:100%;
    max-width:480px;
    background:var(--cream);
    border-radius:28px;
    box-shadow:0 20px 60px rgba(61,31,61,0.35);
    overflow:hidden;
    min-height:640px;
    display:flex;
    flex-direction:column;
  }
  .header{
    background:linear-gradient(120deg,var(--pink),var(--lavender));
    padding:22px 20px;
    text-align:center;
    position:relative;
  }
  .logo{
    font-family:'Georgia',serif;
    font-weight:700;
    font-size:32px;
    color:#fff;
    letter-spacing:2px;
    text-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  .subtitle{color:rgba(255,255,255,0.9);font-size:13px;margin-top:4px;}
  .screen{flex:1;display:flex;flex-direction:column;padding:22px;overflow-y:auto;}
  .hidden{display:none !important;}

  input[type=text]{
    width:100%;
    padding:14px 16px;
    border-radius:16px;
    border:2px solid #FFD9E6;
    font-size:15px;
    margin-bottom:12px;
    outline:none;
    transition:border-color .2s;
    font-family:inherit;
  }
  input[type=text]:focus{border-color:var(--pink);}
  textarea{
    width:100%;
    padding:14px 16px;
    border-radius:16px;
    border:2px solid #FFD9E6;
    font-size:15px;
    outline:none;
    font-family:inherit;
    resize:none;
    min-height:70px;
  }
  textarea:focus{border-color:var(--pink);}

  .btn{
    background:linear-gradient(120deg,var(--pink),var(--coral));
    color:#fff;
    border:none;
    padding:15px 20px;
    border-radius:18px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(255,111,165,0.4);
    transition:transform .15s;
    font-family:inherit;
  }
  .btn:active{transform:scale(0.96);}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-secondary{
    background:#fff;
    color:var(--deep);
    border:2px solid var(--lavender);
    box-shadow:none;
  }
  .btn-mint{background:linear-gradient(120deg,var(--mint),#5FCBAF);box-shadow:0 8px 20px rgba(123,224,201,0.4);}

  .label{font-size:13px;font-weight:600;color:#9c5b7d;margin-bottom:6px;display:block;}

  /* WHEEL */
  .wheel-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:10px 0 20px;}
  .wheel{
    width:170px;height:170px;border-radius:50%;
    background:conic-gradient(var(--pink) 0deg 60deg, var(--coral) 60deg 120deg, var(--lavender) 120deg 180deg, var(--gold) 180deg 240deg, var(--mint) 240deg 300deg, var(--pink) 300deg 360deg);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    box-shadow:0 10px 30px rgba(61,31,61,0.3);
    transition:transform 3s cubic-bezier(.17,.67,.32,1.02);
  }
  .wheel-center{
    width:70px;height:70px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:26px;
    box-shadow:inset 0 2px 6px rgba(0,0,0,0.1);
  }
  .wheel-pointer{
    position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;
    border-top:20px solid var(--deep);
  }
  .turn-indicator{font-size:14px;font-weight:600;text-align:center;color:#9c5b7d;}
  .turn-indicator.yours{color:var(--pink);}

  .card{
    background:#fff;border-radius:20px;padding:20px;
    box-shadow:0 8px 24px rgba(61,31,61,0.12);
    margin-bottom:14px;
  }
  .card-tag{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;
    padding:4px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;
  }
  .tag-pregunta{background:#FFE0EC;color:#D6336C;}
  .tag-reto{background:#E0D4FF;color:#6C3CE0;}
  .card-text{font-size:17px;font-weight:600;line-height:1.4;color:var(--deep);margin-bottom:14px;}

  .history-item{padding:12px 0;border-bottom:1px solid #FFE9F1;}
  .history-item:last-child{border-bottom:none;}
  .history-q{font-size:13px;color:#9c5b7d;font-weight:600;margin-bottom:4px;}
  .history-a{font-size:14px;color:var(--deep);background:#FFF6F0;padding:8px 12px;border-radius:12px;margin-top:4px;}
  .history-a b{color:var(--pink);}

  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:#9c5b7d;border:2px solid transparent;}
  .tab.active{border-color:var(--pink);color:var(--pink);}

  .chat-msg{margin-bottom:8px;display:flex;}
  .chat-bubble{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;}
  .chat-me{margin-left:auto;background:var(--pink);color:#fff;border-bottom-right-radius:4px;}
  .chat-other{background:#fff;color:var(--deep);border-bottom-left-radius:4px;}
  .chat-input-row{display:flex;gap:8px;margin-top:10px;}
  .chat-input-row input{flex:1;margin-bottom:0;}
  .chat-input-row button{padding:12px 16px;border-radius:14px;}

  .fab-row{display:flex;gap:10px;margin-top:auto;padding-top:14px;}
  .fab-row .btn{flex:1;font-size:13px;padding:12px;}

  .streak{
    display:flex;align-items:center;justify-content:center;gap:6px;
    background:#FFF0DC;color:#B8730A;font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:14px;margin-bottom:14px;
  }

  .modal-overlay{
    position:fixed;inset:0;background:rgba(61,31,61,0.5);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:400px;}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:#FFD9E6;border-radius:10px;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <div class="logo">S &amp; E</div>
    <div class="subtitle" id="headerSubtitle">el juego de conocerse</div>
  </div>

  <!-- LOGIN SCREEN -->
  <div class="screen" id="screenLogin">
    <p style="text-align:center;color:#9c5b7d;font-size:14px;margin-bottom:20px;">
      Entra con tu nombre y el código de sala que ambos compartan para jugar juntos en tiempo real 💕
    </p>
    <label class="label">Tu nombre</label>
    <input type="text" id="inputName" placeholder="Ej: Eduardo" maxlength="20">
    <label class="label">Código de sala (el mismo para los dos)</label>
    <input type="text" id="inputRoom" placeholder="Ej: SyE2026" maxlength="24">
    <button class="btn" id="btnEnter" style="margin-top:6px;">Entrar a la sala 🎡</button>
    <p style="text-align:center;color:#c98fb0;font-size:12px;margin-top:16px;">
      Comparte el mismo código con ella para conectarse en la misma sala.
    </p>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen hidden" id="screenGame">
    <div class="tabs">
      <div class="tab active" data-tab="juego">Juego</div>
      <div class="tab" data-tab="historial">Historial</div>
      <div class="tab" data-tab="chat">Chat</div>
    </div>

    <!-- TAB: JUEGO -->
    <div id="tabJuego">
      <div class="streak" id="streakBox">🔥 0 rondas jugadas</div>
      <div class="wheel-wrap">
        <div style="position:relative;">
          <div class="wheel-pointer"></div>
          <div class="wheel" id="wheel"><div class="wheel-center">🎡</div></div>
        </div>
        <div class="turn-indicator" id="turnIndicator">Cargando...</div>
        <button class="btn" id="btnSpin">Girar la ruleta</button>
        <div id="debugStatus" style="font-size:12px;color:#c98fb0;margin-top:6px;min-height:16px;"></div>
      </div>

      <div id="currentCardBox"></div>

      <div class="fab-row">
        <button class="btn btn-secondary" id="btnResetRoom">Reiniciar sala</button>
      </div>
    </div>

    <!-- TAB: HISTORIAL -->
    <div id="tabHistorial" class="hidden">
      <div id="historyList" style="max-height:440px;overflow-y:auto;"></div>
    </div>

    <!-- TAB: CHAT -->
    <div id="tabChat" class="hidden">
      <div id="chatList" style="max-height:400px;overflow-y:auto;margin-bottom:10px;"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Escribe un mensaje...">
        <button class="btn" id="btnChatSend">➤</button>
      </div>
    </div>
  </div>

</div>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="questions.js"></script>
<script src="retos.js"></script>
<script>
let myPhoto = null;

// --- Sonidos divertidos (generados, sin archivos externos) ---
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freqs, duration=0.12, type='sine'){
  try{
    const ctx = getAudioCtx();
    freqs.forEach((f,i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = f;
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i*duration);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (i+1)*duration);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i*duration);
      osc.stop(ctx.currentTime + (i+1)*duration);
    });
  }catch(e){}
}
function soundSpin(){ playTone([392,440,494,523,587,659],0.09,'triangle'); }
function soundReveal(){ playTone([659,880],0.15,'sine'); }
function soundAnswer(){ playTone([523,659,784],0.1,'sine'); }
function soundJoin(){ playTone([440,554,659],0.13,'triangle'); }

// ====== CONFIGURACIÓN DE FIREBASE ======
// Reemplaza estos valores con los de TU proyecto de Firebase
// (Firebase Console > Configuración del proyecto > Tus apps > Config)
const firebaseConfig = {
  apiKey: "AIzaSyCItQit-Aj4lbfO3VxfEjBH2JncYghcg6E",
  authDomain: "sye-game.firebaseapp.com",
  databaseURL: "https://sye-game-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "sye-game",
  storageBucket: "sye-game.firebasestorage.app",
  messagingSenderId: "111583963081",
  appId: "1:111583963081:web:6b75a65d284f254f3baa18",
  measurementId: "G-TWX460P9XF"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function roomKey(){ return `se-rooms/${ROOM}`; }

async function getState(){
  try{
    const snap = await db.ref(roomKey()).once('value');
    return snap.exists() ? snap.val() : null;
  }catch(e){
    console.error("Firebase get error", e);
    window.__lastFirebaseError = e;
    return null;
  }
}
async function setState(state){
  try{
    await db.ref(roomKey()).set(state);
  }catch(e){
    console.error("Firebase set error", e);
    window.__lastFirebaseError = e;
    alert("Error al guardar en Firebase:\n" + (e && e.message ? e.message : e));
  }
}

function freshState(){
  return {
    players: [],
    turnIndex: 0,
    usedIds: [],
    current: null,
    history: [],
    chat: [],
    customItems: []
  };
}

function buildPool(state){
  const pool = [];
  QUESTIONS.forEach((item,i)=> pool.push({id:'q'+i, type:'pregunta', tier:item.t, text:item.q}));
  RETOS.forEach((item,i)=> pool.push({id:'r'+i, type:'reto', tier:item.t, text:item.r}));
  (state.customItems||[]).forEach((item,i)=> pool.push({id:'c'+i, type:item.type==='reto'?'reto':'pregunta', tier: item.tier||1, text:item.text}));
  return pool;
}

function pickTierWeights(answeredCount){
  if(answeredCount < 15) return {1:0.75, 2:0.20, 3:0.05};
  if(answeredCount < 40) return {1:0.45, 2:0.40, 3:0.15};
  return {1:0.25, 2:0.40, 3:0.35};
}

function weightedTierPick(weights){
  const r = Math.random();
  let acc=0;
  for(const t of [1,2,3]){
    acc += weights[t];
    if(r<=acc) return t;
  }
  return 3;
}

function nextItem(state){
  const pool = buildPool(state);
  const available = pool.filter(p=>!state.usedIds.includes(p.id));

  // 20% de probabilidad de que la ruleta caiga en "pregunta libre" o "reto libre":
  // se abre una casilla para que quien tiene el turno la escriba ahí mismo.
  if(Math.random() < 0.20){
    const isReto = Math.random() < 0.5;
    return {
      id: 'libre-'+Date.now(),
      type: isReto ? 'reto' : 'pregunta',
      tier: 2,
      text: null,
      special: true
    };
  }

  if(available.length===0) return null;
  const weights = pickTierWeights(state.history.length);
  const targetTier = weightedTierPick(weights);
  let candidates = available.filter(p=>p.tier===targetTier);
  if(candidates.length===0) candidates = available;
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function renderTurn(state){
  const myTurn = state.players[state.turnIndex % (state.players.length||1)] === ME;
  const el = document.getElementById('turnIndicator');
  if(state.players.length < 2){
    el.textContent = "Esperando a que la otra persona entre...";
    el.className = "turn-indicator";
  } else {
    el.textContent = myTurn ? "🎯 Es tu turno de girar" : `Turno de ${state.players[state.turnIndex % state.players.length]}`;
    el.className = "turn-indicator" + (myTurn ? " yours" : "");
  }
  document.getElementById('btnSpin').disabled = !(myTurn && state.players.length>=2 && !state.current);
  document.getElementById('streakBox').textContent = `🔥 ${state.history.length} ronda${state.history.length===1?'':'s'} jugada${state.history.length===1?'':'s'}`;
}

async function renderCurrentCardAsync(state){
  const box = document.getElementById('currentCardBox');
  if(!state.current){ box.innerHTML=""; return; }
  const c = state.current;
  const isSpinnerTurn = state.players[state.turnIndex % (state.players.length||1)] === ME;

  if(c.special && !c.text){
    if(isSpinnerTurn){
      box.innerHTML = `
        <div class="card">
          <span class="card-tag ${c.type==='reto'?'tag-reto':'tag-pregunta'}">✨ ${c.type} libre</span>
          <div class="card-text">¡Te tocó crear! Escribe tu propia ${c.type} para que la respondan entre los dos.</div>
          <textarea id="freeTextBox" placeholder="Escribe tu ${c.type} aquí..."></textarea>
          <button class="btn" id="btnSubmitFree" style="margin-top:10px;width:100%;">Lanzar ${c.type}</button>
        </div>
      `;
      document.getElementById('btnSubmitFree').onclick = submitFreeText;
    } else {
      box.innerHTML = `
        <div class="card">
          <span class="card-tag ${c.type==='reto'?'tag-reto':'tag-pregunta'}">✨ ${c.type} libre</span>
          <div class="card-text">Esperando a que ${state.players[state.turnIndex % state.players.length]} escriba su ${c.type}...</div>
        </div>
      `;
    }
    return;
  }

  const alreadyAnswered = c.answers && c.answers[ME];
  box.innerHTML = `
    <div class="card">
      <span class="card-tag ${c.type==='reto'?'tag-reto':'tag-pregunta'}">${c.special?'✨ ':''}${c.type}</span>
      <div class="card-text">${c.text}</div>
      ${alreadyAnswered ? `<div class="history-a"><b>Tu respuesta:</b> ${alreadyAnswered}</div>` : `
        <textarea id="answerBox" placeholder="Escribe tu respuesta..."></textarea>
        <button class="btn" id="btnAnswer" style="margin-top:10px;width:100%;">Responder</button>
      `}
    </div>
  `;
  if(!alreadyAnswered){
    document.getElementById('btnAnswer').onclick = submitAnswer;
  }
}

async function submitFreeText(){
  const box = document.getElementById('freeTextBox');
  const text = box.value.trim();
  if(!text) return;
  const state = await getState();
  if(!state || !state.current) return;
  state.current.text = text;
  state.current.writtenBy = ME;
  state.current.answers = state.current.answers || {};
  state.current.answers[ME] = "✍️ (formuló esta " + state.current.type + ")";
  await setState(state);
  render();
}

function renderHistory(state){
  const list = document.getElementById('historyList');
  if(state.history.length===0){
    list.innerHTML = `<p style="text-align:center;color:#c98fb0;margin-top:30px;">Aún no hay historial. ¡Giren la ruleta!</p>`;
    return;
  }
  list.innerHTML = state.history.slice().reverse().map(h=>{
    const answersHtml = Object.entries(h.answers||{}).map(([name,ans])=>
      `<div class="history-a"><b>${name}:</b> ${ans}</div>`
    ).join("");
    return `<div class="history-item">
      <div class="history-q">${h.type==='reto'?'🎯 Reto':'💬 Pregunta'}: ${h.text}</div>
      ${answersHtml}
    </div>`;
  }).join("");
}

function renderChat(state){
  const list = document.getElementById('chatList');
  list.innerHTML = (state.chat||[]).map(m=>
    `<div class="chat-msg"><div class="chat-bubble ${m.from===ME?'chat-me':'chat-other'}">${m.from!==ME?`<b>${m.from}:</b> `:''}${m.text}</div></div>`
  ).join("");
  list.scrollTop = list.scrollHeight;
}

async function render(){
  const state = await getState();
  if(!state) return;
  renderTurn(state);
  await renderCurrentCardAsync(state);
  renderHistory(state);
  renderChat(state);
}

async function joinRoom(){
  const name = document.getElementById('inputName').value.trim();
  const room = document.getElementById('inputRoom').value.trim();
  if(!name || !room){ alert("Escribe tu nombre y el código de sala"); return; }
  ME = name; ROOM = room;

  let state;
  try{
    state = await getState();
    if(!state) state = freshState();
    if(!state.players.includes(ME)){
      if(state.players.length >= 2){
        alert("Esta sala ya tiene dos jugadores (" + state.players.join(" y ") + "). Si quieren empezar de nuevo con otros nombres, usa primero el botón 'Reiniciar sala'.");
        return;
      }
      state.players.push(ME);
    }
    await db.ref(roomKey()).set(state);
  }catch(e){
    alert("Error al conectar con Firebase:\n" + (e && e.message ? e.message : e));
    return;
  }
  soundJoin();

  document.getElementById('screenLogin').classList.add('hidden');
  document.getElementById('screenGame').classList.remove('hidden');
  document.getElementById('headerSubtitle').textContent = `sala: ${ROOM}`;

  render();
  pollTimer = setInterval(render, 2500);
}

let totalSpins = 0;

async function spinWheel(){
  const dbg = document.getElementById('debugStatus');
  dbg.textContent = "Leyendo sala...";
  const state = await getState();
  if(!state){
    dbg.textContent = "❌ Falló la lectura de la sala";
    alert("No se pudo leer la sala. Revisa que ambos hayan entrado con el mismo código y que Firebase esté bien configurado.");
    return;
  }
  const myTurn = state.players[state.turnIndex % (state.players.length||1)] === ME;
  if(state.current){
    dbg.textContent = "⚠️ Hay una pregunta activa sin responder";
    alert("Ya hay una pregunta activa sin responder todavía. Respóndela antes de volver a girar.\n\nPregunta actual: " + (state.current.text || "(pregunta/reto libre pendiente de escribir)"));
    return;
  }
  if(!myTurn){
    dbg.textContent = "⚠️ No es tu turno";
    alert("No es tu turno todavía. Le toca a: " + state.players[state.turnIndex % state.players.length]);
    return;
  }

  const wheel = document.getElementById('wheel');
  totalSpins += 4 + Math.random()*2;
  wheel.style.transform = `rotate(${totalSpins*360}deg)`;
  soundSpin();
  dbg.textContent = "Girando... (espera 3 segundos)";

  const item = nextItem(state);
  if(!item){
    dbg.textContent = "⚠️ Banco agotado";
    setTimeout(()=> alert("¡Ya jugaron todas las preguntas y retos disponibles!"), 3000);
    return;
  }

  setTimeout(async ()=>{
    try{
      dbg.textContent = "Guardando resultado...";
      const fresh = await getState();
      if(!fresh){
        dbg.textContent = "❌ Falló al releer la sala tras girar";
        alert("No se pudo volver a leer la sala después de girar. Revisa tu conexión e intenta de nuevo.");
        return;
      }
      fresh.usedIds.push(item.id);
      if(item.special){
        fresh.current = {id:item.id, type:item.type, text:null, special:true, writtenBy:null, answers:{}};
      } else {
        fresh.current = {id:item.id, type:item.type, text:item.text, answers:{}};
      }
      const savePromise = db.ref(roomKey()).set(fresh);
      const timeoutPromise = new Promise((_, reject)=> setTimeout(()=> reject(new Error("TIMEOUT: la conexión tardó demasiado (posible foto muy pesada o mala señal)")), 8000));
      await Promise.race([savePromise, timeoutPromise]);
      dbg.textContent = "✅ Listo, mostrando resultado";
      soundReveal();
      render();
      setTimeout(()=>{ dbg.textContent = ""; }, 2000);
    }catch(e){
      dbg.textContent = "❌ Error: " + (e && e.message ? e.message : e);
      alert("Error después de girar:\n" + (e && e.message ? e.message : e));
    }
  }, 3000);
}

async function submitAnswer(){
  const box = document.getElementById('answerBox');
  const text = box.value.trim();
  if(!text) return;
  const state = await getState();
  if(!state.current) return;
  state.current.answers[ME] = text;

  const numAnswers = Object.keys(state.current.answers).length;
  if(numAnswers >= (state.players.length||1) && state.players.length>=2){
    state.history.push(state.current);
    state.current = null;
    state.turnIndex = (state.turnIndex+1) % Math.max(state.players.length,1);
  }
  await setState(state);
  soundAnswer();
  render();
}

async function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  const state = await getState();
  state.chat = state.chat || [];
  state.chat.push({from:ME, text:text, ts:Date.now()});
  await setState(state);
  input.value = "";
  render();
}

// EVENTS
document.getElementById('btnEnter').onclick = joinRoom;
document.getElementById('btnSpin').onclick = spinWheel;
document.getElementById('btnChatSend').onclick = sendChat;
document.getElementById('chatInput').addEventListener('keypress', e=>{ if(e.key==='Enter') sendChat(); });

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tabJuego').classList.add('hidden');
    document.getElementById('tabHistorial').classList.add('hidden');
    document.getElementById('tabChat').classList.add('hidden');
    document.getElementById('tab'+tab.dataset.tab.charAt(0).toUpperCase()+tab.dataset.tab.slice(1)).classList.remove('hidden');
  };
});

document.getElementById('btnResetRoom').onclick = async ()=>{
  if(!confirm("Esto va a reiniciar la sala por completo: nombres, turno y pregunta activa (el historial de rondas ya jugadas se conserva). Después de esto, salgan de la app y vuelvan a entrar los dos con sus nombres. ¿Continuar?")) return;
  const state = await getState();
  const history = state ? (state.history || []) : [];
  const newState = freshState();
  newState.history = history;
  await db.ref(roomKey()).set(newState);
  ME = "";
  document.getElementById('screenGame').classList.add('hidden');
  document.getElementById('screenLogin').classList.remove('hidden');
  document.getElementById('inputName').value = "";
  clearInterval(pollTimer);
  alert("Listo, la sala quedó reiniciada. Vuelve a entrar con tu nombre.");
};

</script>
